name: Deploy

on:
  workflow_dispatch:

jobs:
  # 
  # TEST
  # 
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Trivy Security Scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          format: table
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Lint (advisory)
        run: npm run lint || true
        continue-on-error: true

  # 
  # BUILD (Docker image, Trivy scan, push to ECR)
  # 
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: [test]
    outputs:
      # Only the git SHA tag is safe to pass across jobs — it contains no
      # account ID and is never masked by configure-aws-credentials.
      # The full image URI is reconstructed in downstream jobs via ECR login.
      tag: ${{ steps.build.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Ensure ECR repository exists (Terraform targeted apply)
        working-directory: terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

          terraform apply -auto-approve \
            -target=aws_ecr_repository.app \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -var="image_uri=placeholder" \
            -var="db_password=placeholder"

      - name: Build Docker image
        id: build
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          PROJECT_NAME: ${{ secrets.PROJECT_NAME }}
        run: |
          REPO_NAME="${PROJECT_NAME}-app"
          TAG="${{ github.sha }}"
          FULL_URI="${REGISTRY}/${REPO_NAME}:${TAG}"
          docker build -t "${FULL_URI}" .
          echo "full_uri=${FULL_URI}" >> "$GITHUB_OUTPUT"
          echo "repo_name=${REPO_NAME}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: ${{ steps.build.outputs.full_uri }}
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          severity: "CRITICAL"

      - name: Push Docker image to ECR
        id: push
        env:
          FULL_URI: ${{ steps.build.outputs.full_uri }}
        run: |
          docker push "${FULL_URI}"

  # 
  # PROVISION (Terraform)
  # 
  provision:
    name: Provision
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Reconstruct image URI
        id: image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          PROJECT_NAME: ${{ secrets.PROJECT_NAME }}
          TAG: ${{ needs.build.outputs.tag }}
        run: |
          # Reconstruct the full image URI locally in this job using a fresh
          # ECR login (provides REGISTRY without relying on masked cross-job
          # outputs) and the TAG which is the only output safe to pass across
          # jobs (it contains no account ID and is never suppressed).
          IMAGE_URI="${REGISTRY}/${PROJECT_NAME}-app:${TAG}"
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Terraform Apply
        working-directory: terraform
        env:
          IMAGE_URI: ${{ steps.image.outputs.image_uri }}
        run: |
          terraform apply -auto-approve \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -var="image_uri=${IMAGE_URI}" \
            -var="db_password=${{ secrets.DB_PASSWORD }}"

  # 
  # VERIFY
  # 
  verify:
    name: Verify
    runs-on: ubuntu-latest
    needs: [provision]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Get ALB DNS from Terraform output
        id: get_endpoint
        working-directory: terraform
        run: |
          ALB_DNS=$(terraform output -raw alb_dns_name)
          echo "alb_dns=${ALB_DNS}" >> "$GITHUB_OUTPUT"

      - name: Wait for ECS tasks to be healthy
        run: sleep 90

      - name: Smoke test - health endpoint
        env:
          ALB_DNS: ${{ steps.get_endpoint.outputs.alb_dns }}
        run: |-
          HEALTH_URL="http://${ALB_DNS}/health"
          echo "Probing: ${HEALTH_URL}"
          for i in 1 2 3 4 5; do
            STATUS=$(curl -Lsf -o /dev/null -w "%{http_code}" "${HEALTH_URL}" || echo "000")
            echo "Attempt ${i}: HTTP ${STATUS}"
            if [[ "${STATUS}" =~ ^[23] ]]; then
              echo "Health check passed with HTTP ${STATUS}"
              exit 0
            fi
            sleep 30
          done
          echo "Health check failed after 5 attempts"
          exit 1
